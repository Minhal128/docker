version: "3.8"

services:
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
    volumes:
      - mongo_data:/data/db

  mongo-express:
    image: mongo-express:latest
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: admin123
      ME_CONFIG_MONGODB_SERVER: mongodb

  app:
    image: lsd-testapp:1.0
    build: .
    ports:
      - "3000:3000"
      - "3001:3001"
    environment:
      # Pass MongoDB connection string to backend
      MONGO_URI: mongodb://admin:admin123@mongodb:27017/
    depends_on:
      - mongodb

volumes:
  mongo_data:
        